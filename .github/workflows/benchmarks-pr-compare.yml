name: PR Benchmark Compare

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmarks-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark-compare:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout head ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Validate benchmark suite presence
        id: validate
        shell: bash
        run: |
          mkdir -p benchmark-results

          if [[ ! -d base/tests/benchmarks ]]; then
            echo "run_compare=false" >> "$GITHUB_OUTPUT"
            {
              echo "# Benchmark compare"
              echo
              echo "Skipped: \\`base/tests/benchmarks\\` does not exist on base ref."
            } > benchmark-results/compare.md
            exit 0
          fi

          if [[ ! -d head/tests/benchmarks ]]; then
            echo "run_compare=false" >> "$GITHUB_OUTPUT"
            {
              echo "# Benchmark compare"
              echo
              echo "Skipped: \\`head/tests/benchmarks\\` does not exist on head ref."
            } > benchmark-results/compare.md
            exit 0
          fi

          if [[ ! -f head/scripts/bench_compare.py ]]; then
            echo "run_compare=false" >> "$GITHUB_OUTPUT"
            {
              echo "# Benchmark compare"
              echo
              echo "Skipped: \\`head/scripts/bench_compare.py\\` not found."
            } > benchmark-results/compare.md
            exit 0
          fi

          echo "run_compare=true" >> "$GITHUB_OUTPUT"

      - name: Run base quick benchmarks
        if: ${{ steps.validate.outputs.run_compare == 'true' }}
        shell: bash
        env:
          PYTHONPATH: base/tests
        run: |
          uv run --project base --with pytest-benchmark \
            pytest base/tests/benchmarks -m bench_quick -o addopts='' \
            --benchmark-json benchmark-results/base-quick.json \
            --benchmark-min-rounds=5 --benchmark-warmup=on

      - name: Run head quick benchmarks
        if: ${{ steps.validate.outputs.run_compare == 'true' }}
        shell: bash
        env:
          PYTHONPATH: head/tests
        run: |
          uv run --project head --with pytest-benchmark \
            pytest head/tests/benchmarks -m bench_quick -o addopts='' \
            --benchmark-json benchmark-results/head-quick.json \
            --benchmark-min-rounds=5 --benchmark-warmup=on

      - name: Compare benchmark JSON (quick)
        if: ${{ steps.validate.outputs.run_compare == 'true' }}
        id: compare
        shell: bash
        run: |
          set +e
          uv run --project head python head/scripts/bench_compare.py \
            --base benchmark-results/base-quick.json \
            --candidate benchmark-results/head-quick.json \
            > benchmark-results/compare-quick.txt
          status=$?
          set -e

          {
            echo "# Benchmark compare (quick suite)"
            echo
            echo "- Base SHA: \\`${{ github.event.pull_request.base.sha }}\\`"
            echo "- Head SHA: \\`${{ github.event.pull_request.head.sha }}\\`"
            echo "- Compare exit code: \\`$status\\`"
            echo
            echo '```text'
            cat benchmark-results/compare-quick.txt
            echo '```'
          } > benchmark-results/compare.md

          echo "compare_exit=$status" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-compare-${{ github.run_id }}
          path: benchmark-results/*

      - name: Post/Update PR comment
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('benchmark-results/compare.md', 'utf8');
            const marker = '<!-- benchmark-compare-comment -->';
            const fullBody = `${marker}\n${body}`;
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullBody,
              });
            }

      - name: Soft warning on compare failure
        if: ${{ steps.validate.outputs.run_compare == 'true' && steps.compare.outputs.compare_exit != '0' }}
        shell: bash
        run: |
          echo "Benchmark compare returned non-zero exit (likely no overlap or parse issue)."
          echo "See benchmark-results/compare.md artifact and PR comment for details."
