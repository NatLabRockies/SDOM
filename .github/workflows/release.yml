name: Release

# Tag-driven workflow that automates ONLY the GitHub side of a release:
#   1. Verifies the pushed tag matches `project.version` in `pyproject.toml`.
#   2. Creates a GitHub Release with auto-generated, PR-categorized notes.
#
# PyPI publishing is performed MANUALLY by a maintainer using a locally
# stored API token (see `___deploy_sdom.md`). This workflow intentionally
# does NOT upload to PyPI.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  verify-version:
    name: Verify tag matches pyproject version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare tag with pyproject.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "Tag version:        $TAG_VERSION"
          echo "pyproject version:  $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

  github-release:
    name: Create GitHub Release with notes
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "SDOM ${GITHUB_REF_NAME}" \
            --generate-notes
