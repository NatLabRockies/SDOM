name: Run Python Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Upgrade pip and install build tools
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          pip install build hatch pytest --no-cache-dir

      - name: 🧪 Validate metadata and build wheel
        run: |
          python -m build --wheel

      - name: 📥 Install package
        run: |
            pip install . pytest pytest-cov

      - name: 🧮 Install CBC solver (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-cbc
          echo "SDOM_CBC_PATH=$(command -v cbc)" >> "$GITHUB_ENV"

      - name: 🧮 Set CBC path to vendored binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "SDOM_CBC_PATH=$env:GITHUB_WORKSPACE\Solver\bin\cbc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # macOS intentionally has no CBC install step; CBC-specific tests will auto-skip
      # via the SDOM_CBC_PATH/get_cbc_executable() helper. HiGHS still runs there.

      - name: ▶️ Run tests
        run: |
          pytest --ignore=tests/test_docs_build.py --ignore=tests/benchmarks
        continue-on-error: false
